name: Deploy — GitHub Pages

on:
  push:
    branches: [main]        # dispara a cada push na branch main
  workflow_dispatch:         # permite acionar manualmente pela interface do GitHub

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true   # cancela deploy anterior se um novo push chegar

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Build de produção
        run: npm run build
        env:
          # Substitua pelo nome exato do seu repositório no GitHub.
          # Ex.: se a URL for github.com/joao/contaviva-edu → /contaviva-edu/
          # Se for um user-page (joao.github.io) deixe apenas /
          VITE_BASE_PATH: /contaviva-edu/

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload do artefato (pasta dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
